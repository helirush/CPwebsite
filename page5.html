<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cognition Partner — Page 5</title>
  <link rel="shortcut icon" href="cp-thk-favicon.ico?cp_icon=20260722a">
  <link rel="icon" type="image/x-icon" href="cp-thk-favicon.ico?cp_icon=20260722a">
  <link rel="icon" type="image/png" sizes="192x192" href="cp-thk-icon-192.png?cp_icon=20260722a">
  <link rel="icon" type="image/png" sizes="512x512" href="cp-thk-icon-512.png?cp_icon=20260722a">
  <link rel="apple-touch-icon" sizes="180x180" href="cp-thk-apple-touch-icon.png?cp_icon=20260722a">
  <link rel="manifest" href="site.webmanifest?cp_icon=20260722a">
  <meta name="theme-color" content="#2f5e4f">
  <link rel="stylesheet" href="./styles.css?v=20260722-2145" />
</head>
<body class="home-page page3-bottom-right-ui">
  <main class="site-wrap">
    <section class="page-card">
      <img class="page-image" src="./assets/CognitionPartner_p5.png?v=20260722-2145" alt="Cognition Partner page 5 Maxwellian Library" />
      <div class="home-brand-overlay" aria-label="Cognition Partner branding">
        <img class="home-brand-logo" src="./assets/CPlogo_60715.png?v=20260715-1844" alt="Cognition Partner logo" />
        <div class="home-brand-wordmark" aria-hidden="true">
          <span class="home-brand-word home-brand-word-white">COGNITION</span>
          <span class="home-brand-word home-brand-word-gold">PARTNER</span>
          <span class="home-brand-tm">™</span>
        </div>
        <div class="home-brand-divider" aria-hidden="true"></div>
        <p class="home-brand-caption">REASON TOGETHER. BUILD TOMORROW.</p>
      </div>
      <div class="page2-dual-nav page5-lower-right-nav" aria-label="Page navigation controls">
        <a class="down-nav-button down-nav-circle page2-nav-button" href="./page4.html" aria-label="Go to page 4">
          <span class="down-nav-chevron up-nav-chevron" aria-hidden="true"></span>
        </a>
        <a class="down-nav-button return-top-button page2-nav-button" href="./index.html" aria-label="Return home">RETURN HOME</a>
      </div>
      <a class="unity-case-cta" href="#" id="open-lead-form" aria-haspopup="dialog" aria-controls="lead-form-modal" aria-label="Be a part of the team">
        <span class="unity-case-badge" aria-hidden="true">→</span>
        <span class="unity-case-copy">
          <span class="unity-case-title">BE A PART OF THE TEAM.</span>
          <span class="unity-case-subtitle">Fill out the form and connect with our team.</span>
        </span>
      </a>
      <div class="lead-form-modal" id="lead-form-modal" role="dialog" aria-modal="true" aria-labelledby="lead-form-title" hidden>
        <div class="lead-form-backdrop" data-close-lead-form></div>
        <div class="lead-form-panel">
          <button class="lead-form-close" type="button" aria-label="Close form" data-close-lead-form>×</button>
          <h2 class="lead-form-title" id="lead-form-title">Be a part of the team.</h2>
          <p class="lead-form-subtitle">Share your information and our sales team will follow up.</p>
          <form class="lead-form-fields" id="lead-form">
            <label class="lead-form-label" for="lead-name">Name</label>
            <input class="lead-form-input" id="lead-name" name="name" type="text" autocomplete="name" required />
            <label class="lead-form-label" for="lead-email">Email</label>
            <input class="lead-form-input" id="lead-email" name="email" type="email" autocomplete="email" required />
            <label class="lead-form-label" for="lead-company">Company</label>
            <input class="lead-form-input" id="lead-company" name="company" type="text" autocomplete="organization" />
            <label class="lead-form-label" for="lead-message">How can we help?</label>
            <textarea class="lead-form-textarea" id="lead-message" name="message" rows="4" placeholder="Tell us what you’re exploring..." required></textarea>
            <button class="down-nav-button return-top-button lead-form-submit" type="submit">Send to Sales</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script>
    (() => {
      const salesEmail = "sales@cognitionpartner.ai";
      const modal = document.getElementById("lead-form-modal");
      const openButton = document.getElementById("open-lead-form");
      const form = document.getElementById("lead-form");
      const closeTriggers = document.querySelectorAll("[data-close-lead-form]");

      if (!modal || !openButton || !form) {
        return;
      }

      const closeModal = () => {
        modal.hidden = true;
        document.body.classList.remove("lead-form-open");
      };

      const openModal = () => {
        modal.hidden = false;
        document.body.classList.add("lead-form-open");
      };

      openButton.addEventListener("click", (event) => {
        event.preventDefault();
        openModal();
      });
      closeTriggers.forEach((trigger) => {
        trigger.addEventListener("click", closeModal);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeModal();
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!form.reportValidity()) {
          return;
        }

        const data = new FormData(form);
        const name = (data.get("name") || "").toString().trim();
        const email = (data.get("email") || "").toString().trim();
        const company = (data.get("company") || "").toString().trim();
        const message = (data.get("message") || "").toString().trim();
        const subject = "Cognition Partner Lead Inquiry";
        const body = [
          "New Cognition Partner inquiry",
          "",
          `Name: ${name}`,
          `Email: ${email}`,
          `Company: ${company || "Not provided"}`,
          "",
          "Message:",
          message
        ].join("\n");

        window.location.href = `mailto:${salesEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        form.reset();
        closeModal();
      });
    })();
  </script>
</body>
</html>
